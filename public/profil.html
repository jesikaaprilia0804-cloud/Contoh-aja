<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil EduSmart</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dashboard-page profile-page" onload="initProfilePage()">
    <header class="topbar">
      <div class="logo-area">
        <div class="logo-circle">ES</div>
        <div>
          <div class="title">EduSmart</div>
          <div class="subtle">Halaman profil</div>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html" class="menu-btn">Dashboard</a>
        <a href="materi.html" class="menu-btn">Materi</a>
        <a href="quiz.html" class="menu-btn">Quiz</a>
        <a href="kelas.html" class="menu-btn">Kelas</a>
        <a href="profil.html" class="menu-btn active">Profil</a>
        <button onclick="logout()" class="btn-logout">Keluar</button>
      </nav>
    </header>

    <main class="dashboard-container">
      <section class="section-shell">
        <div class="page-head">
          <div>
            <p class="eyebrow">PROFIL PENGGUNA</p>
            <h1>Kelola Profil</h1>
            <p>Ubah nama, email, dan foto profil Anda.</p>
          </div>
        </div>

        <div
          class="feature-grid"
          style="grid-template-columns: 320px 1fr; gap: 24px"
        >
          <!-- KARTU PROFIL -->
          <article class="card-subject" style="text-align: center">
            <div
              id="avatarPreviewWrap"
              style="
                display: flex;
                justify-content: center;
                margin-bottom: 16px;
              "
            >
              <div
                id="avatarBox"
                style="
                  width: 110px;
                  height: 110px;
                  border-radius: 50%;
                  background: #eef3ff;
                  color: #2c3e50;
                  font-size: 32px;
                  font-weight: bold;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  overflow: hidden;
                "
              >
                ES
              </div>
            </div>

            <h3 id="profileName">Nama Pengguna</h3>
            <p id="profileRole">ROLE</p>
            <p id="detailEmail">email@contoh.com</p>
          </article>

          <!-- FORM EDIT -->
          <article class="card-subject">
            <h3 style="margin-bottom: 16px">Edit Profil</h3>

            <div class="form-group">
              <label for="editNamaLengkap">Nama Lengkap</label>
              <input
                type="text"
                id="editNamaLengkap"
                placeholder="Masukkan nama lengkap"
              />
            </div>

            <div class="form-group">
              <label for="editEmail">Email</label>
              <input
                type="email"
                id="editEmail"
                placeholder="Masukkan email baru"
              />
            </div>

            <div class="form-group">
              <label for="editFotoProfil">Foto Profil</label>
              <input
                type="file"
                id="editFotoProfil"
                accept=".jpg,.jpeg,.png,.webp"
              />
              <small style="display: block; margin-top: 6px; opacity: 0.75">
                Disarankan gambar kecil, maksimal 500 KB.
              </small>
            </div>

            <div class="form-group">
              <label for="editPasswordBaru">Password Baru (Opsional)</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="editPasswordBaru"
                  placeholder="Kosongkan jika tidak ingin mengganti password"
                />
                <button
                  class="toggle"
                  type="button"
                  onclick="togglePass('editPasswordBaru', this)"
                >
                  👁️
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="editKonfirmasiPassword"
                >Konfirmasi Password Baru</label
              >
              <div class="password-wrapper">
                <input
                  type="password"
                  id="editKonfirmasiPassword"
                  placeholder="Ulangi password baru"
                />
                <button
                  class="toggle"
                  type="button"
                  onclick="togglePass('editKonfirmasiPassword', this)"
                >
                  👁️
                </button>
              </div>
            </div>

            <div
              id="profileErrorMsg"
              style="color: #e74c3c; min-height: 1.2em; margin: 10px 0"
            ></div>

            <div
              class="card-footer-row"
              style="
                margin-top: 18px;
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
              "
            >
              <button
                type="button"
                class="btn-buka"
                onclick="simpanPerubahanProfil()"
              >
                Simpan Perubahan
              </button>
              <button
                type="button"
                class="ghost-btn"
                onclick="resetFormProfil()"
              >
                Reset
              </button>
            </div>
          </article>
        </div>
      </section>
    </main>
    <!-- WIDGET AKSESIBILITAS -->
    <div class="a11y-widget" id="a11yWidget">
      <div class="a11y-panel" id="a11yPanel">
        <p class="a11y-title">Fitur Aksesibilitas</p>
        <button
          onclick="toggleAccessibility('dark-mode')"
          id="btn-dark"
          class="a11y-item"
        >
          <span id="btn-dark-icon">🌙</span>
          <span id="btn-dark-text">Mode Gelap</span>
        </button>
        <button
          onclick="toggleAccessibility('high-contrast')"
          id="btn-contrast"
          class="a11y-item"
        >
          <span id="btn-contrast-icon">◐</span>
          <span id="btn-contrast-text">Kontras Tinggi</span>
        </button>
      </div>
      <button
        class="a11y-toggle"
        onclick="toggleA11yPanel()"
        aria-label="Pengaturan Aksesibilitas"
        title="Aksesibilitas"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="4.5" r="2.5" />
          <path d="M12 7v6" />
          <path d="M7 11.5l5 3 5-3" />
          <path d="M7 16l5 3 5-3" />
        </svg>
      </button>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
  </body>
</html>
